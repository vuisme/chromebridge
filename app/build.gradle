plugins {
    id "com.android.application"
}

android {
    namespace "dev.local.chromeuabridge"
    compileSdk 35

    defaultConfig {
        applicationId "dev.local.chromeuabridge"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        fixed {
            storeFile file("signing/test-signing.p12")
            storePassword "chromeuabridge"
            keyAlias "1"
            keyPassword "chromeuabridge"
            storeType "PKCS12"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.fixed
        }
        release {
            signingConfig signingConfigs.fixed
            minifyEnabled false
        }
    }
}

dependencies {
    compileOnly "de.robv.android.xposed:api:82"
}
