name: Build APK

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/ChromeUaBridgeLsposed-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChromeUaBridgeLsposed-debug-apk
          path: release/ChromeUaBridgeLsposed-debug.apk

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated debug APK build from `${{ github.sha }}`.
          files: release/ChromeUaBridgeLsposed-debug.apk
